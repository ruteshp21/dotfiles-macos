format = '[ $symbol $context ]($style)'

# --- System & Timers ---------------------------------------------------------

[cmd_duration]
style = 'bold yellow'
format = '[ ¾░öÄ $duration ]($style)'

[time]
disabled = false
style = 'bold overlay0'
format = '[ ¾▒æŹ $time ]($style)'
time_format = '%T'

