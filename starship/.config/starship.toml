# ~/.config/starship.toml

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

command_timeout = 1000

# Set the active palette (change to 'catppuccin_latte' for light mode)
palette = 'catppuccin_mocha'

# Left prompt: OS, Directory, and Git info
format = """
$os\
$directory\
$git_branch\
$git_status\
$line_break\
$character"""

# Right prompt: Tech stack, Contexts, and Timers
right_format = """
$python\
$nodejs\
$java\
$golang\
$rust\
$lua\
$aws\
$kubernetes\
$docker_context\
$cmd_duration\
$time\
"""

continuation_prompt = 'ŌØ»ŌØ» '

[character]
success_symbol = '[ŌØ»](bold green)'
error_symbol = '[ŌØ»](bold red)'
vimcmd_symbol = '[ŌØ«](bold sapphire)'

# --- Core --------------------------------------------------------------------

[os]
disabled = false
style = 'bold blue'
format = '[$symbol]($style)'

[os.symbols]
Macos = '’ģ╣ '
Ubuntu = '’īø '
Windows = 'Ņ£Å '

[directory]
style = 'bold lavender'
format = '[ $path ]($style)'
truncation_length = 4
truncation_symbol = 'ŌĆ”/'
read_only = ' ’ĆŻ'

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "’Ćü "
"Pictures" = "’ĆŠ "
"Codespace" = "¾░▓ŗ "

[git_branch]
symbol = '’Éś'
style = 'bold mauve'
format = '[ $symbol $branch ]($style)'

[git_status]
style = 'bold maroon'
format = '[$all_status$ahead_behind ]($style)'
conflicted = '­¤Å│ '
up_to_date = ''
untracked = '’ö® '
ahead = 'ŌćĪ${count}'
diverged = 'ŌćĢŌćĪ${ahead_count}ŌćŻ${behind_count}'
behind = 'ŌćŻ${count}'
stashed = '’Ż¢ '
modified = '’üä '
staged = '[++\($count\)](green)'
renamed = '’¬Č '
deleted = '’Ćö '

# --- Languages & Tools -------------------------------------------------------

[python]
symbol = 'ŅłĄ'
style = 'bold yellow'
format = '[ $symbol $version ]($style)'

[nodejs]
symbol = 'Ņ£ś'
style = 'bold green'
format = '[ $symbol $version ]($style)'

[java]
symbol = 'Ņē¢'
style = 'bold red'
format = '[ $symbol $version ]($style)'

[golang]
symbol = 'Ņś¦'
style = 'bold sky'
format = '[ $symbol $version ]($style)'

[rust]
symbol = 'Ņ×©'
style = 'bold peach'
format = '[ $symbol $version ]($style)'

[lua]
symbol = 'ŅśĀ'
style = 'bold blue'
format = '[ $symbol $version ]($style)'

[aws]
symbol = 'Ņ×Ł'
style = 'bold peach'
format = '[ $symbol $profile ]($style)'

[kubernetes]
symbol = '¾▒āŠ'
style = 'bold teal'
format = '[ $symbol $context( \($namespace\)) ]($style)'
